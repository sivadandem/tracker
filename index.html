<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Analytics — Interview Prep Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0eeea;
    --muted: #888580;
    --accent: #c8f251;
    --accent2: #7df9c2;
    --accent3: #f9c27d;
    --accent4: #c27dff;
    --accent5: #7dc8f9;
    --danger: #ff6b6b;
    --radius: 12px;
    --radius-sm: 7px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,242,81,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,242,81,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    margin-bottom: 2.5rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--text);
  }

  .header-left h1 span {
    color: var(--accent);
  }

  .header-left p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 0.4rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.02em;
  }

  .stats-bar {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-top: 1.5rem;
  }

  .stat-chip {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .stat-chip .val {
    color: var(--accent);
    font-weight: 500;
    font-size: 1.1rem;
  }

  .stat-chip .lbl {
    color: var(--muted);
    font-size: 0.75rem;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.2rem 1.5rem;
    margin-bottom: 2rem;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .progress-top span {
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .progress-top strong {
    color: var(--accent);
    font-size: 1.1rem;
  }

  .progress-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* PHASE LABELS */
  .phase-label {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.25rem 0.7rem;
    border-radius: 99px;
    display: inline-block;
    margin-bottom: 0.75rem;
    margin-top: 2rem;
  }

  .phase-sql    { background: rgba(125,249,194,0.12); color: var(--accent2); border: 0.5px solid rgba(125,249,194,0.25); }
  .phase-python { background: rgba(125,200,249,0.12); color: var(--accent5); border: 0.5px solid rgba(125,200,249,0.25); }
  .phase-stats  { background: rgba(194,125,255,0.12); color: var(--accent4); border: 0.5px solid rgba(194,125,255,0.25); }
  .phase-tools  { background: rgba(249,194,125,0.12); color: var(--accent3); border: 0.5px solid rgba(249,194,125,0.25); }
  .phase-final  { background: rgba(200,242,81,0.12);  color: var(--accent);  border: 0.5px solid rgba(200,242,81,0.25);  }

  /* DAY CARD */
  .day-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 0.75rem;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-card:hover { border-color: var(--border2); }

  .day-card.completed {
    border-color: rgba(200,242,81,0.2);
    background: linear-gradient(135deg, rgba(200,242,81,0.03), var(--surface));
  }

  .day-card.today {
    border-color: rgba(200,242,81,0.4);
    box-shadow: 0 0 0 1px rgba(200,242,81,0.1);
  }

  .day-header {
    display: flex;
    align-items: center;
    padding: 1rem 1.25rem;
    cursor: pointer;
    gap: 1rem;
    user-select: none;
  }

  .day-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    min-width: 52px;
  }

  .day-title-wrap {
    flex: 1;
  }

  .day-num-label {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 1px;
  }

  .day-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .day-card.completed .day-title { color: var(--accent); }

  .today-badge {
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    background: rgba(200,242,81,0.15);
    color: var(--accent);
    border: 0.5px solid rgba(200,242,81,0.3);
    padding: 2px 7px;
    border-radius: 99px;
    margin-left: 0.5rem;
  }

  .chevron {
    color: var(--muted);
    font-size: 0.75rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .day-card.open .chevron { transform: rotate(90deg); }

  /* checkbox */
  .check-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }

  .check-wrap input[type="checkbox"] {
    appearance: none;
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border2);
    border-radius: 5px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    background: transparent;
    flex-shrink: 0;
  }

  .check-wrap input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-wrap input[type="checkbox"]:checked::after {
    content: '✓';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #0d0d0f;
    font-size: 12px;
    font-weight: 700;
  }

  /* day body */
  .day-body {
    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 0.5px solid var(--border);
  }

  .day-card.open .day-body { display: block; }

  .topic-list {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding-top: 1rem;
  }

  .topic-list li {
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.35rem 0.75rem;
    color: var(--text);
    line-height: 1.4;
  }

  .topic-list li.warn {
    border-color: rgba(249,194,125,0.35);
    background: rgba(249,194,125,0.07);
    color: var(--accent3);
  }

  .topic-list li.tip {
    border-color: rgba(125,249,194,0.3);
    background: rgba(125,249,194,0.06);
    color: var(--accent2);
  }

  .notes-input {
    width: 100%;
    margin-top: 1rem;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.6rem 0.9rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.2s;
  }

  .notes-input:focus { border-color: var(--border2); }
  .notes-input::placeholder { color: var(--muted); }

  .notes-label {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-top: 0.9rem;
    display: block;
  }

  /* reset button */
  .reset-btn {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    background: transparent;
    border: 0.5px solid rgba(255,107,107,0.3);
    color: var(--danger);
    padding: 0.4rem 0.9rem;
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-top: 2.5rem;
    display: block;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    background: rgba(255,107,107,0.08);
    border-color: rgba(255,107,107,0.5);
  }

  /* interview countdown */
  .countdown {
    background: linear-gradient(135deg, rgba(200,242,81,0.08), rgba(125,249,194,0.05));
    border: 0.5px solid rgba(200,242,81,0.2);
    border-radius: var(--radius);
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .countdown .icon { font-size: 1.4rem; }

  .countdown .msg {
    font-size: 0.85rem;
    color: var(--text);
  }

  .countdown .days-left {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }

  .countdown .sub {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>Data Analytics<br><span>Interview Prep</span></h1>
      <p>Apr 25 → May 15, 2026 &nbsp;·&nbsp; 20 days</p>
    </div>
  </header>

  <div class="countdown" id="countdown"></div>

  <div class="progress-wrap">
    <div class="progress-top">
      <span>Overall progress</span>
      <strong id="pct">0%</strong>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div id="schedule"></div>

  <button class="reset-btn" onclick="resetAll()">↺ Reset all progress</button>
</div>

<script>
const PLAN = [
  // --- SQL PHASE (you're here) ---
  {
    phase: "sql", phaseLabel: "SQL — You're Here",
    date: "Apr 25", day: 1,
    title: "SQL Foundations Refresh",
    topics: ["SELECT, WHERE, ORDER BY, LIMIT","GROUP BY + HAVING vs WHERE","INNER JOIN, LEFT JOIN, RIGHT JOIN","Aliases & column expressions","DISTINCT, COUNT, SUM, AVG, MAX, MIN"],
    warn: ["HAVING filters after grouping — WHERE filters before"],
    tips: ["Write 5 queries from scratch today — no copying"]
  },
  {
    phase: "sql", phaseLabel: null,
    date: "Apr 26", day: 2,
    title: "SQL — Subqueries & CTEs",
    topics: ["Subqueries in WHERE, FROM, SELECT","WITH clause (CTEs)","Correlated subqueries","EXISTS vs IN","Nested queries pattern"],
    warn: ["CTEs make code readable — practice rewriting subqueries as CTEs"],
    tips: ["Solve 5 LeetCode SQL easy problems"]
  },
  {
    phase: "sql", phaseLabel: null,
    date: "Apr 27", day: 3,
    title: "SQL — Window Functions",
    topics: ["ROW_NUMBER(), RANK(), DENSE_RANK()","LAG() and LEAD()","SUM() OVER (PARTITION BY)","FIRST_VALUE(), LAST_VALUE()","NTILE()"],
    warn: ["Window functions = MOST asked in analytics interviews","PARTITION BY ≠ GROUP BY — understand the difference"],
    tips: ["Practice: find 2nd highest salary, running totals, day-over-day change"]
  },
  {
    phase: "sql", phaseLabel: null,
    date: "Apr 28", day: 4,
    title: "SQL — Practice Day",
    topics: ["10 HackerRank / LeetCode SQL medium problems","Focus: JOIN + GROUP BY combos","At least 2 window function problems","CASE WHEN practice","Date functions: DATEDIFF, DATE_TRUNC, EXTRACT"],
    warn: [],
    tips: ["Time yourself — aim to finish each query in under 5 mins","Explain your logic aloud while writing"]
  },

  // --- PYTHON PHASE ---
  {
    phase: "python", phaseLabel: "Python + Pandas Revision",
    date: "Apr 29", day: 5,
    title: "Python Core Refresh",
    topics: ["List, dict, set — operations","List & dict comprehensions","Functions, *args, **kwargs","Lambda functions","Exception handling basics"],
    warn: ["Focus on dict methods — very common in data cleaning"],
    tips: []
  },
  {
    phase: "python", phaseLabel: null,
    date: "Apr 30", day: 6,
    title: "Pandas — Core Operations",
    topics: ["read_csv, head(), info(), describe()","loc vs iloc (indexing)","Boolean filtering & masks","rename, drop, reset_index","Handling nulls: fillna(), dropna(), isnull()"],
    warn: ["loc uses labels, iloc uses position numbers — know the difference","dropna() vs fillna() — when to use which?"],
    tips: ["Use Titanic or any Kaggle CSV — don't practice on made-up data"]
  },
  {
    phase: "python", phaseLabel: null,
    date: "May 1", day: 7,
    title: "Pandas — GroupBy & Merge",
    topics: ["groupby() + agg() — multiple functions","merge() — inner, left, right, outer","concat() for stacking DataFrames","pivot_table() vs crosstab()","apply() and map() on columns"],
    warn: ["merge types = SQL joins — connect them mentally","groupby + agg({'col': ['mean','sum','count']}) pattern"],
    tips: ["Write groupby+merge from scratch 3 times without looking"]
  },
  {
    phase: "python", phaseLabel: null,
    date: "May 2", day: 8,
    title: "NumPy + EDA Mini Project",
    topics: ["np.array, broadcasting","np.mean, std, percentile, where","Matplotlib: line, bar, scatter, histogram","Seaborn: heatmap, boxplot","Full EDA on one dataset: clean → explore → visualize"],
    warn: [],
    tips: ["Document your EDA like a presentation — you may be asked to walk through it"]
  },

  // --- STATS + MATH ---
  {
    phase: "stats", phaseLabel: "Statistics & Math",
    date: "May 3", day: 9,
    title: "Statistics — Descriptive",
    topics: ["Mean, Median, Mode — when to use which","Variance & Standard Deviation","IQR, outliers, box plot interpretation","Skewness & kurtosis basics","Normal distribution, Z-score"],
    warn: ["Mean is sensitive to outliers — use median for skewed data"],
    tips: []
  },
  {
    phase: "stats", phaseLabel: null,
    date: "May 4", day: 10,
    title: "Statistics — Inferential",
    topics: ["Probability basics & rules","Conditional probability, Bayes theorem","Hypothesis testing (H0, H1)","p-value, significance level (α = 0.05)","Type I error (false positive) vs Type II (false negative)","A/B testing concept"],
    warn: ["p-value < 0.05 means reject H0 — understand WHY, not just the rule","Correlation ≠ causation — classic interview point"],
    tips: ["Watch StatQuest on YouTube for p-value — 10 min, very clear"]
  },
  {
    phase: "stats", phaseLabel: null,
    date: "May 5", day: 11,
    title: "Math for Analytics",
    topics: ["Percentages, ratios, growth rates","Log & exponential — when data grows fast","Linear regression: slope, intercept, R²","What is a matrix & dot product (intuition only)","Gradient descent — intuition, not formula"],
    warn: ["Start with percentages — most practical in business analytics"],
    tips: ["Don't memorize formulas — understand the intuition","Linear regression is very commonly asked — know R², residuals"]
  },

  // --- EXCEL + POWER BI ---
  {
    phase: "tools", phaseLabel: "Excel + Power BI",
    date: "May 6", day: 12,
    title: "Excel — Core Functions",
    topics: ["VLOOKUP & XLOOKUP — syntax & direction","INDEX + MATCH combo","IF, NESTED IF, IFS","COUNTIF, SUMIF, AVERAGEIF","LEN, TRIM, LEFT, RIGHT, MID"],
    warn: ["VLOOKUP only looks RIGHT — INDEX MATCH is more flexible","Know when XLOOKUP replaces VLOOKUP"],
    tips: []
  },
  {
    phase: "tools", phaseLabel: null,
    date: "May 7", day: 13,
    title: "Excel — Pivot Tables & Charts",
    topics: ["Pivot Table: rows, columns, values, filters","Calculated fields in pivot","Conditional formatting","Data validation & dropdowns","Charts: bar, line, combo — formatting"],
    warn: [],
    tips: ["Build one full pivot table analysis from raw data"]
  },
  {
    phase: "tools", phaseLabel: null,
    date: "May 8", day: 14,
    title: "Power BI — Data Model & Visuals",
    topics: ["Import data (CSV, Excel, SQL)","Relationships between tables (one-to-many)","Basic visuals: bar, line, card, table, slicer","Filters: page, visual, report level","Drill-down & drill-through"],
    warn: [],
    tips: []
  },
  {
    phase: "tools", phaseLabel: null,
    date: "May 9", day: 15,
    title: "Power BI — DAX",
    topics: ["Measures vs Calculated Columns","SUM, AVERAGE, COUNTROWS","CALCULATE() — most important DAX function","FILTER() inside CALCULATE","ALL(), ALLEXCEPT() — remove filters","Time intelligence: TOTALYTD, SAMEPERIODLASTYEAR"],
    warn: ["CALCULATE is the heart of DAX — spend most time here","Measure lives in the report, Calculated Column lives in the table"],
    tips: []
  },

  // --- FINAL SPRINT ---
  {
    phase: "final", phaseLabel: "Final Sprint — Revise & Practice",
    date: "May 10", day: 16,
    title: "Python + SQL Integrated Practice",
    topics: ["Run SQL queries in Python (sqlite3 / sqlalchemy)","Pandas operations that mirror SQL joins","EDA on a business dataset","Write and explain your code out loud"],
    warn: [],
    tips: ["Practice explaining your code as you write — interviewers love this"]
  },
  {
    phase: "final", phaseLabel: null,
    date: "May 11", day: 17,
    title: "Stats + Case Study",
    topics: ["Explain p-value, A/B test, regression in plain English","1 analytics case study: define metric → analyze → conclude","Outlier handling decisions","When to use mean vs median in reports"],
    warn: ["Practice explaining concepts to a non-technical person"],
    tips: []
  },
  {
    phase: "final", phaseLabel: null,
    date: "May 12", day: 18,
    title: "Weak Area Day",
    topics: ["Revisit your most confusing topics","Extra SQL window function problems","Redo difficult pandas operations from scratch","Review DAX CALCULATE and Excel VLOOKUP"],
    warn: [],
    tips: ["Be honest — what do you still get confused by? Focus only on that today"]
  },
  {
    phase: "final", phaseLabel: null,
    date: "May 13", day: 19,
    title: "Mock Interview Day",
    topics: ["Timed SQL test: 5 problems in 30 minutes (HackerRank)","Explain 5 stats concepts aloud without notes","Walk through a Python EDA project verbally","Write a DAX measure and explain it"],
    warn: [],
    tips: ["Record yourself if possible — notice where you hesitate"]
  },
  {
    phase: "final", phaseLabel: null,
    date: "May 14", day: 20,
    title: "Light Revision + Rest",
    topics: ["Quick notes review: SQL window functions","Quick notes: Pandas groupby + merge","p-value, A/B testing, linear regression in 3 sentences each","Sleep early — be sharp for tomorrow"],
    warn: [],
    tips: ["NO new topics today. Rest is part of preparation."]
  },
];

const PHASE_COLORS = {
  sql: 'phase-sql',
  python: 'phase-python',
  stats: 'phase-stats',
  tools: 'phase-tools',
  final: 'phase-final',
};

const PHASE_LABELS = {
  sql: '⚡ SQL — You\'re Here',
  python: '🐍 Python + Pandas',
  stats: '📊 Statistics & Math',
  tools: '🛠 Excel + Power BI',
  final: '🏁 Final Sprint',
};

function getState() {
  try { return JSON.parse(localStorage.getItem('da_tracker') || '{}'); } catch { return {}; }
}
function saveState(s) {
  localStorage.setItem('da_tracker', JSON.stringify(s));
}

function getToday() {
  // Returns "Apr 25" style from today's date
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = new Date();
  return `${months[d.getMonth()]} ${d.getDate()}`;
}

function updateStats() {
  const state = getState();
  const total = PLAN.length;
  const done = PLAN.filter(d => state[`done_${d.day}`]).length;
  const pct = Math.round((done / total) * 100);

  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  // phase stats
  const phases = ['sql','python','stats','tools','final'];
  const phaseNames = { sql:'SQL', python:'Python', stats:'Stats/Math', tools:'Excel/PBI', final:'Final Sprint' };
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = '';
  phases.forEach(ph => {
    const pDays = PLAN.filter(d => d.phase === ph);
    const pDone = pDays.filter(d => state[`done_${d.day}`]).length;
    const chip = document.createElement('div');
    chip.className = 'stat-chip';
    chip.innerHTML = `<span class="val">${pDone}/${pDays.length}</span><span class="lbl">${phaseNames[ph]}</span>`;
    bar.appendChild(chip);
  });
}

function updateCountdown() {
  const interview = new Date('2026-05-15');
  const now = new Date();
  const diff = Math.ceil((interview - now) / (1000 * 60 * 60 * 24));
  const box = document.getElementById('countdown');
  if (diff > 0) {
    box.innerHTML = `<span class="icon">🎯</span><div><div class="days-left">${diff} days</div><div class="sub">until your interview — May 15, 2026</div></div><div class="msg" style="margin-left:auto;font-size:0.78rem;color:var(--muted);">You've got this. Stay consistent.</div>`;
  } else if (diff === 0) {
    box.innerHTML = `<span class="icon">🔥</span><div><div class="days-left">TODAY</div><div class="sub">Interview day — May 15, 2026. Go crush it.</div></div>`;
  } else {
    box.innerHTML = `<span class="icon">✅</span><div><div class="days-left" style="color:var(--accent2)">Done!</div><div class="sub">Interview was on May 15. Hope it went well!</div></div>`;
  }
}

function renderSchedule() {
  const state = getState();
  const today = getToday();
  const container = document.getElementById('schedule');
  container.innerHTML = '';

  let lastPhase = null;

  PLAN.forEach(item => {
    // Phase heading
    if (item.phase !== lastPhase) {
      const ph = document.createElement('div');
      ph.className = `phase-label ${PHASE_COLORS[item.phase]}`;
      ph.textContent = PHASE_LABELS[item.phase];
      container.appendChild(ph);
      lastPhase = item.phase;
    }

    const isDone = !!state[`done_${item.day}`];
    const isToday = item.date === today;
    const savedNote = state[`note_${item.day}`] || '';

    const card = document.createElement('div');
    card.className = `day-card${isDone ? ' completed' : ''}${isToday ? ' today' : ''}`;
    card.dataset.day = item.day;

    card.innerHTML = `
      <div class="day-header" onclick="toggleCard(${item.day})">
        <span class="day-date">${item.date}</span>
        <div class="day-title-wrap">
          <div class="day-num-label">Day ${item.day}</div>
          <div class="day-title">${item.title}${isToday ? '<span class="today-badge">today</span>' : ''}</div>
        </div>
        <div class="check-wrap" onclick="event.stopPropagation()">
          <input type="checkbox" id="chk_${item.day}" ${isDone ? 'checked' : ''} onchange="toggleDone(${item.day})" title="Mark as complete">
        </div>
        <span class="chevron">▶</span>
      </div>
      <div class="day-body">
        <ul class="topic-list">
          ${item.topics.map(t => `<li>${t}</li>`).join('')}
          ${item.warn.map(t => `<li class="warn">⚠ ${t}</li>`).join('')}
          ${item.tips.map(t => `<li class="tip">💡 ${t}</li>`).join('')}
        </ul>
        <span class="notes-label">Notes (saved automatically)</span>
        <textarea class="notes-input" placeholder="Add your notes for today..." onchange="saveNote(${item.day}, this.value)">${savedNote}</textarea>
      </div>
    `;

    container.appendChild(card);

    // Auto-open today
    if (isToday) {
      card.classList.add('open');
    }
  });
}

function toggleCard(day) {
  const card = document.querySelector(`.day-card[data-day="${day}"]`);
  card.classList.toggle('open');
}

function toggleDone(day) {
  const state = getState();
  const chk = document.getElementById(`chk_${day}`);
  state[`done_${day}`] = chk.checked;
  saveState(state);
  const card = document.querySelector(`.day-card[data-day="${day}"]`);
  if (chk.checked) card.classList.add('completed');
  else card.classList.remove('completed');
  updateStats();
}

function saveNote(day, val) {
  const state = getState();
  state[`note_${day}`] = val;
  saveState(state);
}

function resetAll() {
  if (confirm('Reset all progress and notes? This cannot be undone.')) {
    localStorage.removeItem('da_tracker');
    renderSchedule();
    updateStats();
  }
}

// Init
renderSchedule();
updateStats();
updateCountdown();
</script>
</body>
</html>
